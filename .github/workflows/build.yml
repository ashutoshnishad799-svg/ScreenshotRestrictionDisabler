name: Build APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk ScreenshotRestrictionDisabler-v1.0-release.apk 2>/dev/null || true
          mv app/build/outputs/apk/debug/app-debug.apk ScreenshotRestrictionDisabler-v1.0-debug.apk 2>/dev/null || true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenshotRestrictionDisabler-APK
          path: |
            *.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
          body: |
            ## Screenshot Restriction Disabler

            Xposed/LSPosed module to disable FLAG_SECURE on selected Android apps.

            ### Features
            - Master Switch (global ON/OFF)
            - Per-app toggle selection
            - Search apps by name/package
            - System app filter
            - Clean Material UI

            ### Requirements
            - Root + LSPosed/Xposed framework
            - Android 7.0+ (API 24+)

            ### Installation
            1. Install APK
            2. Enable in LSPosed Manager → Modules
            3. Select target apps in LSPosed scope
            4. Open app → Master Switch ON → select apps
            5. Restart target apps
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
